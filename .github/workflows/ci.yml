name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate
        run: make validate

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build discover image
        run: docker build --target discover -t asset-discovery:discover .

      - name: Build API image
        run: docker build --target api -t asset-discovery:api .

      - name: Build worker image
        run: docker build --target worker -t asset-discovery:worker .

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker
    environment: production
    env:
      OPENAI_API_KEY_SECRET: asset-discovery-openai-api-key
    concurrency:
      group: asset-discovery-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_PRODUCTION }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        env:
          API_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/asset-discovery-api:${{ github.sha }}
        run: docker buildx build --target api --platform linux/amd64 --tag "$API_IMAGE" --push .

      - name: Build and push worker image
        env:
          WORKER_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/asset-discovery-worker:${{ github.sha }}
        run: docker buildx build --target worker --platform linux/amd64 --tag "$WORKER_IMAGE" --push .

      - name: Deploy Cloud Run worker job
        env:
          WORKER_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/asset-discovery-worker:${{ github.sha }}
        run: >
          gcloud run jobs deploy "${{ vars.CLOUD_RUN_JOB }}"
          --project "${{ vars.GCP_PROJECT_ID }}"
          --region "${{ vars.GCP_REGION }}"
          --image "$WORKER_IMAGE"
          --service-account "${{ vars.RUNTIME_SERVICE_ACCOUNT }}"
          --tasks 1
          --max-retries 0
          --task-timeout 3600s
          --set-secrets "OPENAI_API_KEY=${OPENAI_API_KEY_SECRET}:latest"
          --set-env-vars "^##^ASSET_DISCOVERY_FIREBASE_PROJECT_ID=${{ vars.ASSET_DISCOVERY_FIREBASE_PROJECT_ID }}##ASSET_DISCOVERY_EXPORT_GCS_BUCKET=${{ vars.ASSET_DISCOVERY_EXPORT_GCS_BUCKET }}##ASSET_DISCOVERY_CHECKPOINT_GCS_BUCKET=${{ vars.ASSET_DISCOVERY_CHECKPOINT_GCS_BUCKET }}##ASSET_DISCOVERY_EXPORT_GCS_PREFIX=${{ vars.ASSET_DISCOVERY_EXPORT_GCS_PREFIX }}"

      - name: Deploy Cloud Run API service
        env:
          API_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/asset-discovery-api:${{ github.sha }}
        run: >
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}"
          --project "${{ vars.GCP_PROJECT_ID }}"
          --region "${{ vars.GCP_REGION }}"
          --image "$API_IMAGE"
          --service-account "${{ vars.RUNTIME_SERVICE_ACCOUNT }}"
          --allow-unauthenticated
          --set-secrets "OPENAI_API_KEY=${OPENAI_API_KEY_SECRET}:latest"
          --set-env-vars "^##^ASSET_DISCOVERY_FIREBASE_PROJECT_ID=${{ vars.ASSET_DISCOVERY_FIREBASE_PROJECT_ID }}##ASSET_DISCOVERY_EXPORT_GCS_BUCKET=${{ vars.ASSET_DISCOVERY_EXPORT_GCS_BUCKET }}##ASSET_DISCOVERY_CHECKPOINT_GCS_BUCKET=${{ vars.ASSET_DISCOVERY_CHECKPOINT_GCS_BUCKET }}##ASSET_DISCOVERY_EXPORT_GCS_PREFIX=${{ vars.ASSET_DISCOVERY_EXPORT_GCS_PREFIX }}##ASSET_DISCOVERY_ALLOWED_ORIGINS=${{ vars.ASSET_DISCOVERY_ALLOWED_ORIGINS }}##ASSET_DISCOVERY_WORKER_JOB_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}##ASSET_DISCOVERY_WORKER_JOB_REGION=${{ vars.GCP_REGION }}##ASSET_DISCOVERY_WORKER_JOB_NAME=${{ vars.CLOUD_RUN_JOB }}"
